front:
  text: 序豫觀修真祕要一書言簡而旨深功廉而效大誠修身延命之術也且夫人稟陰陽之氣以生其本始未嘗少缺一與物接乾元之祖漸為七情所耗是以氣滯血凝而病生焉故古之君子見道分明知言養氣欲行集義之功必先熊頸鳥伸收視返聽以導引其關節關節通則一氣流行於上下矣易曰天行健君子以自強不息此之謂也蓋天地之道晝夜運行而不息吾身之氣亦晝夜周流而無間知天地之道然後可以言吾身之造化矣孔子曰變通莫大乎四時孟子曰我善養吾浩然之氣即此而觀則知仲尼誠體是易孟子真有此氣大哉孔孟神妙萬物至極而不尚者乎奈何道喪千載聖遠言湮仰東山者動輒以功名富貴為心談聖學者但見以工麗詞章為重曾無一言以及吾身之造化者可勝嘆哉豫得此集豈容自私遂付諸梓以廣前人修己治人之意有志於是者覽而行之雖未必能壽考若籛鏗登玄如松子然於性命之祕亦可少裨其萬一也上達之士幸勿以是為迂哉正德八年乙亥孟春元旦閩中王蔡識
  hash: sha256:c05bde7ea104bc886f0de413b07adf05697e0a005da3bf01bcbbd4a87b321596
