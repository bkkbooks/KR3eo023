body:
  text: 跋嘗聞庖犧氏之王天下也畫八卦以斷吉凶神農氏之王天下也嘗百草以療疾病至於軒黃咨於岐伯雷公用著醫術傳之後世無非所以全世命而厚民生也但人之疾病起於不常地之相去亦有遠近且如都邑城市以疾求醫固云而矣則夫山林澤藪遐陬僻壤之地素無攻醫之方又乏針砭之具一旦疾生莫知所措其不至於凶夭短折者幾稀此修真祕要之書所以為可鋟也是書一行則凡具眼目者採而行之不必求之盧扁𪀧方劑而吾身之沉疴可瘳矣嗚呼宜哉云崖道人跋仙人撫琴治久病黃腫以兩手按膝施功存想閉息周流運氣四十九口如此則氣通血融而病自除矣絞丹田治肚腹疼痛亦能養精以身端坐兩手抱臍下行功運氣四十九口仙人存氣開關治肚腹虛飽用兩手抱肩以目左視運氣一十二口仙人指路治左癱右瘓以手左指右視運氣二十四口以手右指左視運氣二十四口九九登天治絞腹痧痛不可堪以身端坐用兩手攀膝躋胸左右登扳九數運氣二十四口周天火候治血氣衰敗先以兩手搽目用手主定兩腋其氣上升運氣一十二口呂祖散精法治精脈不存坐舒兩腿手扳左腳心施功運氣左三口右三口故為散而不走呂祖散運息氣專主止夜夢遺精坐舒兩腳用兩手扳腳心行功運氣九口龍扳爪治遍身疼痛以身坐直舒兩腳兩手握拳連身向前運氣一十二口神仙斗柄開關治一切雜病以身端坐兩手按膝左右扭身運氣一十四口治頭暈兩手抱頭端坐行功運氣一十七口鳴天鼓治頭暈咬牙閉氣用兩手按耳後彈天鼓三十六指叩齒三十六通治後心虛疼坐按兩膝用意在心左視右提運氣一十二口右視左提亦運氣一十二口霸王舉鼎治肚內一切雜病以身端坐用左手按膝右手舉起運氣一十二口右手亦然虎施威治赤白痢疾用托布勢行功向左運氣九口轉身向右運氣九口專治久癤以身端坐用兩手摩兩脅並患處行功運氣三十二口托天塔治肚腹虛腫以身端坐兩手托天運氣上九口下九口烏龍探爪治腰腿疼痛坐舒兩腳兩手向前與足齊來往行功運氣神仙進禮治癱患以身高坐左腳彎圈右腳斜舒兩手左舉右視運氣二十四口右亦如之仙人攪轆轤治背膊疼痛以身高坐左腿彎右腿舒左手舉右手摩腹行功運氣一十二口治胸膈膨悶以左手向左右亦隨之頭向右扭以右手向右左亦隨之頭向左扭運氣左九口右九口呂祖破氣法治疲症用兩拳主兩脅與心齊用力存想行功運氣左二十四口右亦如之抽添火候調理血脈上治三焦不和眼目昏花虛弱以身端坐先用手擦熱抹腳心手按兩膝端坐開口呵氣九口呂祖破氣法專治久癤以身端坐左拳主左脅右手按右膝專心存想運氣於病處左六口右六口仙人拔劍治一切心疼丁字步立右手揚起扭身左視左手於後運氣九口轉身轉手同前童子拜觀音治前後心疼八字立定低頭於胸前兩手抄腹下用功行氣一十七口暖丹田治小腸虛冷疼端坐搽丹田行功運氣四十九口陳摶睡功治四時傷寒側臥屈膝以手擦熱抱陰及囊運氣二十四口呂祖行氣訣治背膊疼痛立住左手舒右手捏膊肚運氣二十二口右手亦然立站活人心治腰疼立住鞠躬低頭手與腳尖齊運氣二十四口一名烏龍擺尾降牛捉月收精法其法當精欲走之時以左手指掩右鼻孔右手於尾閭穴截住精道運氣六口而精自回矣呂祖養精法以身端坐用手擦腳心運氣十四口右腳亦然搖天柱治頭疼及諸風與血脈不通兩手按膝向左扭項扭背運氣一十二口右亦然呂祖救疾法治氣脈不通立用功如左邊氣脈不通左手行功意在左邊舉左手運氣右邊亦然神仙靠拐治腰背疼端立以手主拐項腰左右轉運氣一十八口一氣運三遍用膝拂地擺金剛搗磑治肚腹膨脹遍身疼痛以身立住用兩手托天腳根向地緊撮穀道運氣九口陳摶睡功治色勞側臥頭枕右手左拳在腹上下往來擦摩右腿在下微卷左腿壓右腿在下有想調息習睡收氣三十二口在腹如此運氣一十二口久而行之病自痊矣仙人脫靴治腰疼立柱用右手扶牆左手下垂右腳登舒運氣一十八口左右亦同童子拜觀音坐定舒兩腳兩手按兩大腿根用意存想運氣一十二口陳摶睡功治夢泄精仰臥右手枕頭左手用功左腿直舒右腿拳存想運氣二十四口陳摶睡功治五穀不消仰面直臥兩手在胸並肚腹上往來行功翻江攪海運氣六口治腰腿疼立柱兩手握拳如鞠躬勢到地沉沉起身雙手舉起過頂閉口鼻內微微放氣三四口李白玩月治血脈不通用打蛇勢手腳俱要交叉左右行功左行氣一十二口右亦如之治腎堂虛冷治腰腿疼端坐兩手擦熱向背後摩精門運氣二十四口霸王散法治遍身拘束疼痛時氣傷寒立住左腳向前握兩拳運氣一十二口右腳亦然餓虎撲食以肚腹著地兩手向後往上舉兩腳亦往上舉運氣十口亦治絞腸痧百氣衝頂治遍身疼痛高坐腿舒立行搭弓勢運氣一十二口任脈此脈通百病消除以身端坐兩手拿胸傍二穴如此九次運氣九口雙手拿風雷專治混腦痧及頭風疼不止者以兩手抱耳連後腦運氣一十二口行十二次
